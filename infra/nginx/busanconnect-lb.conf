upstream busanconnect_frontend {
    # Open source Nginx uses round robin by default.
    server 168.107.6.209:80 max_fails=3 fail_timeout=15s;
    server 168.107.25.250:80 max_fails=3 fail_timeout=15s;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/busanconnect.access.log;
    error_log /var/log/nginx/busanconnect.error.log warn;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_pass http://busanconnect_frontend;
    }
}
