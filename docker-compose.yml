services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: busan-visited-frontend
    environment:
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-https://forge.butterfly-effect.dev}
    ports:
      - "4173:80"
    restart: unless-stopped
