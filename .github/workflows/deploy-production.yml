name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/busanconnect-frontend
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}

      - name: Deploy on OCI
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_PORT: ${{ secrets.OCI_PORT }}
          OCI_USER: ${{ secrets.OCI_USER }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORGE_API_KEY: ${{ secrets.VITE_FRONTEND_FORGE_API_KEY }}
          FORGE_API_URL: ${{ secrets.VITE_FRONTEND_FORGE_API_URL }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          if [ -n "${FORGE_API_URL}" ]; then
            DEPLOY_FORGE_URL="${FORGE_API_URL}"
          else
            DEPLOY_FORGE_URL="https://forge.butterfly-effect.dev"
          fi

          KEY_B64="$(printf '%s' "${FORGE_API_KEY}" | base64 -w 0)"
          URL_B64="$(printf '%s' "${DEPLOY_FORGE_URL}" | base64 -w 0)"
          GHCR_USER_B64="$(printf '%s' "${GHCR_USERNAME}" | base64 -w 0)"
          GHCR_TOKEN_B64="$(printf '%s' "${GHCR_TOKEN}" | base64 -w 0)"
          SSH_OPTIONS="-o StrictHostKeyChecking=accept-new -o ConnectTimeout=15"

          ssh ${SSH_OPTIONS} -p "${OCI_PORT}" "${OCI_USER}@${OCI_HOST}" "
            set -eu
            export VITE_FRONTEND_FORGE_API_KEY=\$(printf '%s' '${KEY_B64}' | base64 -d)
            export VITE_FRONTEND_FORGE_API_URL=\$(printf '%s' '${URL_B64}' | base64 -d)
            export GHCR_USERNAME=\$(printf '%s' '${GHCR_USER_B64}' | base64 -d)
            export GHCR_TOKEN=\$(printf '%s' '${GHCR_TOKEN_B64}' | base64 -d)
            export IMAGE_REF='${IMAGE_NAME}:${IMAGE_TAG}'
            export CONTAINER_NAME='busan-visited-frontend'
            export HOST_PORT='80'
            /bin/sh -s
          " < scripts/deploy-remote.sh
